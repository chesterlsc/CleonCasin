<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Speed Baccarat 3D Concept Comparison</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; background: #030405; color: #ece4d4; font-family: Arial, sans-serif; }
      body { padding: 18px; }
      main { height: calc(100vh - 36px); display: grid; grid-template-columns: 0.82fr 1.18fr; gap: 14px; }
      figure { min-width: 0; min-height: 0; margin: 0; display: grid; grid-template-rows: 28px minmax(0, 1fr); overflow: hidden; border: 1px solid #6d5936; border-radius: 12px; background: #080a0c; }
      figcaption { display: flex; align-items: center; padding: 0 12px; border-bottom: 1px solid #3f3525; color: #d6bd82; font-size: 10px; font-weight: 800; letter-spacing: 0.16em; }
      img { width: 100%; height: 100%; display: block; object-fit: cover; object-position: 50% 0; }
      figure:last-child img { object-position: 50% 50%; }
    </style>
  </head>
  <body>
    <main>
      <figure>
        <figcaption>REFERENCE CONCEPT</figcaption>
        <img src="./2026-07-18-baccarat-3d-concept-source.png" alt="Reference Speed Baccarat concept" />
      </figure>
      <figure>
        <figcaption>RESPONSIVE IMPLEMENTATION</figcaption>
        <img src="./2026-07-18-baccarat-3d-desktop-dealt-final.png" alt="Implemented Speed Baccarat table" />
      </figure>
    </main>
  </body>
</html>
